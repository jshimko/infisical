{{ if .Values.infisical.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "infisical.fullname" . }}
  annotations:
    updatedAt: {{ now | date "2006-01-01 MST 15:04:05" | quote }}
    {{- with .Values.infisical.deploymentAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    {{- include "infisical.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.infisical.replicaCount }}
  selector:
    matchLabels:
      {{- include "infisical.matchLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "infisical.matchLabels" . | nindent 8 }}
      annotations:
        updatedAt: {{ now | date "2006-01-01 MST 15:04:05" | quote }}
        {{- with .Values.infisical.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.infisical.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.infisical.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.infisical.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.infisical.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.infisical.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.infisical.image.imagePullSecrets | nindent 6 }}
      {{- end }}
      {{- if or .Values.infisical.autoGenerateSecrets .Values.infisical.autoDatabaseSchemaMigration }}
      serviceAccountName: {{ include "infisical.serviceAccountName" . }}
      {{- end }}
      initContainers:
      {{- if .Values.infisical.autoGenerateSecrets }}
      - name: ensure-secret-exists
        image: alpine/k8s:1.34.0
        command:
        - "/bin/bash"
        - "-c"
        - |
          # Check if secret already exists (to avoid regenerating on restarts)
          if kubectl get secret {{ .Values.infisical.kubeSecretRef }} -n {{ .Release.Namespace }} &>/dev/null; then
            echo "Secret '{{ .Values.infisical.kubeSecretRef }}' already exists in namespace '{{ .Release.Namespace }}'"
            exit 0
          fi

          # Generate secure random values using openssl
          echo "Generating secure random values..."
          AUTH_SECRET=$(openssl rand -base64 32 | base64)
          ENCRYPTION_KEY=$(openssl rand -hex 16 | base64)
          SITE_URL=$(echo "{{ .Values.infisical.siteUrl }}" | base64)

          # Create the secret
          echo "Creating Kubernetes secret: {{ .Values.infisical.kubeSecretRef }}"
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: {{ .Values.infisical.kubeSecretRef }}
            namespace: {{ .Release.Namespace }}
          type: Opaque
          data:
            AUTH_SECRET: ${AUTH_SECRET}
            ENCRYPTION_KEY: ${ENCRYPTION_KEY}
            SITE_URL: ${SITE_URL}
          EOF

          if [ $? -eq 0 ]; then
            echo "Secret '{{ .Values.infisical.kubeSecretRef }}' created in namespace '{{ .Release.Namespace }}'"
          else
            echo "Failed to create secret"
            exit 1
          fi
      {{- end }}
      {{- if .Values.infisical.autoDatabaseSchemaMigration }}
      - name: "migration-init"
        image: "{{ .Values.infisical.databaseSchemaMigrationJob.image.repository }}:{{ .Values.infisical.databaseSchemaMigrationJob.image.tag }}"
        imagePullPolicy: {{ .Values.infisical.databaseSchemaMigrationJob.image.pullPolicy }}
        args:
        - "job"
        - "{{ .Release.Name }}-schema-migration-{{ .Release.Revision }}"
      {{- end }}
      containers:
      - name: {{ template "infisical.name" . }}-{{ .Values.infisical.name }}
        image: "{{ .Values.infisical.image.repository }}:{{ .Values.infisical.image.tag }}"
        imagePullPolicy: {{ .Values.infisical.image.pullPolicy }}
        ports:
        - containerPort: 8080
        env:
        # postgres
        {{- if .Values.cnpg.enabled }}
        - name: CNPG_URI
          valueFrom:
            secretKeyRef:
              name: "{{ .Values.cnpg.cluster.name }}-app"
              key: "uri"
        - name: DB_CONNECTION_URI
          value: "$(CNPG_URI){{ .Values.cnpg.dbUrlOptions }}"
        {{- end }}

        # redis
        {{- if .Values.redis.enabled  }}
        - name: REDIS_URL
          value: "redis://{{ .Values.redis.name }}:6379"
        - name: REDIS_HOST
          value: {{ .Values.redis.name }}
        - name: REDIS_PORT
          value: "6379"
        {{- end }}

        {{- with .Values.infisical.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

        envFrom:
        - secretRef:
            name: {{ .Values.infisical.kubeSecretRef }}
        {{- with .Values.infisical.envFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}

        {{- with .Values.infisical.securityContext }}
        securityContext:
          {{- toYaml . | nindent 12 }}
        {{- end }}

        {{- with .Values.infisical.startupProbe }}
        startupProbe:
          {{- toYaml . | nindent 12 }}
        {{- end }}

        {{- with .Values.infisical.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 12 }}
        {{- end }}

        {{- with .Values.infisical.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 12 }}
        {{- end }}

        {{- with  .Values.infisical.resources }}
        resources: {{- toYaml . | nindent 12 }}
        {{- end }}

        {{- with .Values.infisical.volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}

      {{- with .Values.infisical.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "infisical.fullname" . }}
  labels:
    {{- include "infisical.labels" . | nindent 4 }}
  {{- with .Values.infisical.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.infisical.service.type }}
  selector:
    {{- include "infisical.matchLabels" . | nindent 8 }}
  ports:
    - protocol: TCP
      port: {{ default 8080 .Values.infisical.service.port }}
      targetPort: 8080
      {{- if eq .Values.infisical.service.type "NodePort" }}
      nodePort: {{ .Values.infisical.service.nodePort }}
      {{- end }}
{{ end }}
